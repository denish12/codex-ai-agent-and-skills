version: 1
name: "tests_quality_review"
display_name: "Tests Quality Review"
description: "Review the quality of unit/integration tests ? scenario coverage, boundaries, stability, absence of flaky behavior and test \"magic\". Checklist with priorities, good/bad test examples, output report template. Activate when reviewing existing tests, stabilizing flaky tests, or auditing test suite quality."
default_prompt: "Use $tests_quality_review when the task matches the \"Tests Quality Review\" skill."
triggers:
  - "tests_quality_review"
  - "tests quality review"
  - "Review the quality of unit/integration tests ? scenario coverage, boundaries, stability, absence of flaky behavior and test \"magic\""
capabilities:
  - "tests"
  - "quality"
  - "review"
tools: []
invocation:
  explicit: true
  implicit: true
localization:
  default_locale: "en"
  available_locales:
    - "ru"
    - "en"
