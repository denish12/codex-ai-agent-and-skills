version: 1
name: "node_express_beast_practices"
display_name: "Node/Express Beast Practices"
description: "Node.js + Express: REST API, middleware, service layer, repositories, centralized error handling, retries, rate limiting, background tasks, structured logs."
default_prompt: "Use $node_express_beast_practices when the task matches the \"Node/Express Beast Practices\" skill."
triggers:
  - "node_express_beast_practices"
  - "node express beast practices"
  - "Node/Express Beast Practices"
  - "Node"
capabilities:
  - "node"
  - "express"
  - "beast"
  - "practices"
tools: []
invocation:
  explicit: true
  implicit: true
localization:
  default_locale: "en"
  available_locales:
    - "ru"
    - "en"
