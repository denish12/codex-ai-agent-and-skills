version: 1
name: "observability_plan"
display_name: "Find all logs for a specific request:"
description: "Plan observability — which logs/metrics/traces collect, correlation requests, levels logs, alerts. Without leaks PII/secrets."
default_prompt: "Use $observability_plan when the task matches the \"Find all logs for a specific request:\" skill."
triggers:
  - "observability_plan"
  - "observability plan"
  - "Find all logs for a specific request:"
  - "Plan observability — which logs/metrics/traces collect, correlation requests, levels logs, alerts"
capabilities:
  - "observability"
  - "plan"
tools: []
invocation:
  explicit: true
  implicit: true
localization:
  default_locale: "en"
  available_locales:
    - "ru"
    - "en"
