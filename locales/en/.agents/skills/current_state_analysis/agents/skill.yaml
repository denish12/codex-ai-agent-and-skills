version: 1
name: "current_state_analysis"
display_name: "Current State Analysis"
description: "Analysis of the current repository architecture — conventions, patterns, tech debt, scaling bottlenecks, security risks, and consistency."
default_prompt: "Use $current_state_analysis when the task matches the \"Current State Analysis\" skill."
triggers:
  - "current_state_analysis"
  - "current state analysis"
  - "Analysis of the current repository architecture — conventions, patterns, tech debt, scaling bottlenecks, security risks, and consistency"
capabilities:
  - "current"
  - "state"
  - "analysis"
tools: []
invocation:
  explicit: true
  implicit: true
localization:
  default_locale: "en"
  available_locales:
    - "ru"
    - "en"
