version: 1
name: "qa_test_plan"
display_name: "QA Test Plan"
description: "Create a QA test plan and coverage matrix from PRD and UX - roles, critical flows, UI states, negative cases, and acceptance criteria."
default_prompt: "Use $qa_test_plan when the task matches the \"QA Test Plan\" skill."
triggers:
  - "qa_test_plan"
  - "qa test plan"
  - "Create a QA test plan and coverage matrix from PRD and UX - roles, critical flows, UI states, negative cases, and acceptance criteria"
capabilities:
  - "qa"
  - "test"
  - "plan"
tools: []
invocation:
  explicit: true
  implicit: true
localization:
  default_locale: "en"
  available_locales:
    - "ru"
    - "en"
