version: 1
name: "pm-prd"
display_name: "PRD (Product Requirements Document)"
description: "Generate a PRD — Vision, MVP, out-of-scope, user stories, acceptance criteria, NFR, risks, and open questions. The result must be verifiable."
default_prompt: "Use $pm-prd when the task matches the \"PRD (Product Requirements Document)\" skill."
triggers:
  - "pm-prd"
  - "pm prd"
  - "PRD (Product Requirements Document)"
  - "Generate a PRD — Vision, MVP, out-of-scope, user stories, acceptance criteria, NFR, risks, and open questions"
capabilities:
  - "pm"
  - "prd"
tools: []
invocation:
  explicit: true
  implicit: true
localization:
  default_locale: "en"
  available_locales:
    - "ru"
    - "en"
