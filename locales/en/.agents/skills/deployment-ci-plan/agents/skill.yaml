version: 1
name: "deployment-ci-plan"
display_name: "Deployment & CI Plan"
description: "Deployment and CI plan — environments, configs, secrets, migrations, checks in CI (tests/lint/security), release and rollback strategy."
default_prompt: "Use $deployment-ci-plan when the task matches the \"Deployment & CI Plan\" skill."
triggers:
  - "deployment-ci-plan"
  - "deployment ci plan"
  - "Deployment & CI Plan"
  - "Deployment and CI plan — environments, configs, secrets, migrations, checks in CI (tests/lint/security), release and rollback strategy"
capabilities:
  - "deployment"
  - "ci"
  - "plan"
tools: []
invocation:
  explicit: true
  implicit: true
localization:
  default_locale: "en"
  available_locales:
    - "ru"
    - "en"
