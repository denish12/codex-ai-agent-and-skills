version: 1
name: "node_express_beast_practices"
display_name: "Node/Express Beast Practices"
description: "Node.js + Express — REST API, middleware pipeline, service layer, repositories, centralized handling errors, validation (Zod), graceful shutdown, health checks, security headers. Activate with writing API, refactoring Express-applications, or with questions «how correctly organize backend on Express»."
default_prompt: "Use $node_express_beast_practices when the task matches the \"Node/Express Beast Practices\" skill."
triggers:
  - "node_express_beast_practices"
  - "node express beast practices"
  - "Node/Express Beast Practices"
  - "Node"
capabilities:
  - "node"
  - "express"
  - "beast"
  - "practices"
tools: []
invocation:
  explicit: true
  implicit: true
localization:
  default_locale: "en"
  available_locales:
    - "ru"
    - "en"
