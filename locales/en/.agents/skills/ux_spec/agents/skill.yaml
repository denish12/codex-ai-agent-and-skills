version: 1
name: "ux_spec"
display_name: "UX Spec"
description: "Create a UX Specification - user flows, information architecture, screen list, specification of each screen (actions/sections/validation/states), and UX quality criteria for development and testing."
default_prompt: "Use $ux_spec when the task matches the \"UX Spec\" skill."
triggers:
  - "ux_spec"
  - "ux spec"
  - "Create a UX Specification - user flows, information architecture, screen list, specification of each screen (actions/sections/validation/states), and UX quality criteria for development and testing"
capabilities:
  - "ux"
  - "spec"
tools: []
invocation:
  explicit: true
  implicit: true
localization:
  default_locale: "en"
  available_locales:
    - "ru"
    - "en"
