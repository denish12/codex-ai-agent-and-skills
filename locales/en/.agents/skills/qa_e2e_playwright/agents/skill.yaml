version: 1
name: "qa_e2e_playwright"
display_name: "E2E Playwright (CI/CD Automated)"
description: "E2E testing via Playwright for CI/CD — automated spec files, page objects, visual regression, pipeline integration. For manual testing in Antigravity → $qa_browser_testing."
default_prompt: "Use $qa_e2e_playwright when the task matches the \"E2E Playwright (CI/CD Automated)\" skill."
triggers:
  - "qa_e2e_playwright"
  - "qa e2e playwright"
  - "E2E Playwright (CI/CD Automated)"
  - "E2E testing via Playwright for CI/CD — automated spec files, page objects, visual regression, pipeline integration"
capabilities:
  - "qa"
  - "e2e"
  - "playwright"
tools: []
invocation:
  explicit: true
  implicit: true
localization:
  default_locale: "en"
  available_locales:
    - "ru"
    - "en"
