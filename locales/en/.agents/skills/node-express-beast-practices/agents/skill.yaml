version: 1
name: "node-express-beast-practices"
display_name: "Node/Express Beast Practices"
description: "Node.js + Express — REST API, middleware pipeline, service layer, repositories, centralized error handling, validation (Zod), graceful shutdown, health checks, security headers. Activate when writing an API, refactoring Express applications, or for questions on \"how to properly organize a backend on Express\"."
default_prompt: "Use $node-express-beast-practices when the task matches the \"Node/Express Beast Practices\" skill."
triggers:
  - "node-express-beast-practices"
  - "node express beast practices"
  - "Node/Express Beast Practices"
  - "Node"
capabilities:
  - "node"
  - "express"
  - "beast"
  - "practices"
tools: []
invocation:
  explicit: true
  implicit: true
localization:
  default_locale: "en"
  available_locales:
    - "ru"
    - "en"
