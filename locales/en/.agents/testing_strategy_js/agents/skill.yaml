version: 1
name: "testing_strategy_js"
display_name: "Testing Strategy (JS/TS)"
description: "Strategy testing for JS/TS projects — unit (Vitest), integration (API/DB), e2e (Playwright). AAA-pattern, Vitest config, React Testing Library, mocks external services, coverage thresholds, naming conventions, CI pipeline. Activate with writing new tests, refactoring existing, or with questions «how correctly test X»."
default_prompt: "Use $testing_strategy_js when the task matches the \"Testing Strategy (JS/TS)\" skill."
triggers:
  - "testing_strategy_js"
  - "testing strategy js"
  - "Testing Strategy (JS/TS)"
  - "Strategy testing for JS/TS projects — unit (Vitest), integration (API/DB), e2e (Playwright)"
capabilities:
  - "testing"
  - "strategy"
  - "js"
tools: []
invocation:
  explicit: true
  implicit: true
localization:
  default_locale: "en"
  available_locales:
    - "ru"
    - "en"
