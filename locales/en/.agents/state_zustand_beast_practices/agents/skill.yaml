version: 1
name: "state_zustand_beast_practices"
display_name: "Zustand Beast Practices"
description: "Zustand — simple global state without prop drilling, module store, selectors, avoiding extra rerenders. Patterns creation slice-stores, middleware (immer, persist, devtools), TypeScript typing, testing. Activate with creation new store, refactoring state management, or with questions «how correctly organize Zustand»."
default_prompt: "Use $state_zustand_beast_practices when the task matches the \"Zustand Beast Practices\" skill."
triggers:
  - "state_zustand_beast_practices"
  - "state zustand beast practices"
  - "Zustand Beast Practices"
  - "Zustand — simple global state without prop drilling, module store, selectors, avoiding extra rerenders"
capabilities:
  - "state"
  - "zustand"
  - "beast"
  - "practices"
tools: []
invocation:
  explicit: true
  implicit: true
localization:
  default_locale: "en"
  available_locales:
    - "ru"
    - "en"
