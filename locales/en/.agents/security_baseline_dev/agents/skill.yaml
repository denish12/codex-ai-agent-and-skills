version: 1
name: "security_baseline_dev"
display_name: "Security Baseline (Dev)"
description: "Baseline security in implementation ? validation of input data (Zod), secrets management, safe errors, auth/authz patterns, XSS/injection prevention, dependency audit, secure headers. DO/DON'T examples. Activate when writing any code working with user input, auth, secrets, or questions like \"how to do X safely\"."
default_prompt: "Use $security_baseline_dev when the task matches the \"Security Baseline (Dev)\" skill."
triggers:
  - "security_baseline_dev"
  - "security baseline dev"
  - "Security Baseline (Dev)"
  - "Baseline security in implementation ? validation of input data (Zod), secrets management, safe errors, auth/authz patterns, XSS/injection prevention, dependency audit, secure headers"
capabilities:
  - "security"
  - "baseline"
  - "dev"
tools: []
invocation:
  explicit: true
  implicit: true
localization:
  default_locale: "en"
  available_locales:
    - "ru"
    - "en"
