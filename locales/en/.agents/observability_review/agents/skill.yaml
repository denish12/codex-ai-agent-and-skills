version: 1
name: "observability_review"
display_name: "Observability review"
description: "Observability review: structured logs, request_id/trace_id, log levels, prohibition of PII/secrets leaks, compliance with the Observability Plan."
default_prompt: "Use $observability_review when the task matches the \"Observability review\" skill."
triggers:
  - "observability_review"
  - "observability review"
capabilities:
  - "observability"
  - "review"
tools: []
invocation:
  explicit: true
  implicit: true
localization:
  default_locale: "en"
  available_locales:
    - "ru"
    - "en"
