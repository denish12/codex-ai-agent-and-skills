version: 1
name: "ui_a11y_smoke_review"
display_name: "UI & A11y Smoke Review"
description: "Quick UI/a11y smoke review: states loading/empty/error, focus, keyboard, aria/labels by a11y baseline and UX Spec."
default_prompt: "Use $ui_a11y_smoke_review when the task matches the \"UI & A11y Smoke Review\" skill."
triggers:
  - "ui_a11y_smoke_review"
  - "ui a11y smoke review"
  - "UI & A11y Smoke Review"
  - "Quick UI/a11y smoke review"
capabilities:
  - "ui"
  - "a11y"
  - "smoke"
  - "review"
tools: []
invocation:
  explicit: true
  implicit: true
localization:
  default_locale: "en"
  available_locales:
    - "ru"
    - "en"
