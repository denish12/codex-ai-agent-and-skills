version: 1
name: "release_gate_checklist_template"
display_name: "Release Gate Checklist Template (RG-01…RG-xx)"
description: "Generates a visible checklist RG-01...RG-xx (Evidence/DoD/Security/Ops/Post-deploy/Rollback) and status rules before release."
default_prompt: "Use $release_gate_checklist_template when the task matches the \"Release Gate Checklist Template (RG-01…RG-xx)\" skill."
triggers:
  - "release_gate_checklist_template"
  - "release gate checklist template"
  - "Release Gate Checklist Template (RG-01…RG-xx)"
  - "Generates a visible checklist RG-01"
capabilities:
  - "release"
  - "gate"
  - "checklist"
  - "template"
tools: []
invocation:
  explicit: true
  implicit: true
localization:
  default_locale: "en"
  available_locales:
    - "ru"
    - "en"
