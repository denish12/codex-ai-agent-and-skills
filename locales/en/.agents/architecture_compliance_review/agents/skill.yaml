version: 1
name: "architecture_compliance_review"
display_name: "Checking code compliance with architecture/ADR"
description: "Checking code compliance with architecture/ADR: module boundaries, layers, dependencies, conventions, red flags."
default_prompt: "Use $architecture_compliance_review when the task matches the \"Checking code compliance with architecture/ADR\" skill."
triggers:
  - "architecture_compliance_review"
  - "architecture compliance review"
  - "Checking code compliance with architecture/ADR"
capabilities:
  - "architecture"
  - "compliance"
  - "review"
tools: []
invocation:
  explicit: true
  implicit: true
localization:
  default_locale: "en"
  available_locales:
    - "ru"
    - "en"
