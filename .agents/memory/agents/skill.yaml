version: 1
name: "memory"
display_name: "Память и векторная БД"
description: "Управление контекстом проекта через векторную БД/MCP: что сохранять, как извлекать, как избегать конфликтов решений и потери контекста."
default_prompt: "Используй $memory, когда задача относится к навыку \"Память и векторная БД\"."
triggers:
  - "memory"
  - "Память и векторная БД"
  - "Управление контекстом проекта через векторную БД/MCP"
capabilities:
  - "memory"
tools: []
invocation:
  explicit: true
  implicit: true
localization:
  default_locale: "ru"
  available_locales:
    - "ru"
    - "en"
