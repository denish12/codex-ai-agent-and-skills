version: 1
name: "pm_interview"
display_name: "PM-интервью и дискавери"
description: "Структурированное интервью/разбор документации: собрать цели, аудиторию, MVP, ограничения, интеграции и критерии успеха, чтобы можно было написать PRD."
default_prompt: "Используй $pm_interview, когда задача относится к навыку \"PM-интервью и дискавери\"."
triggers:
  - "pm_interview"
  - "pm interview"
  - "PM-интервью и дискавери"
  - "Структурированное интервью/разбор документации"
capabilities:
  - "pm"
  - "interview"
tools: []
invocation:
  explicit: true
  implicit: true
localization:
  default_locale: "ru"
  available_locales:
    - "ru"
    - "en"
