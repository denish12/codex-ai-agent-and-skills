version: 1
name: "pm_backlog"
display_name: "PM-бэклог"
description: "Декомпозиция PRD в первичный backlog — эпики, фичи и задачи с приоритетами, зависимостями и предложением итераций (MVP → v1)."
default_prompt: "Используй $pm_backlog, когда задача относится к навыку \"PM-бэклог\"."
triggers:
  - "pm_backlog"
  - "pm backlog"
  - "PM-бэклог"
  - "Декомпозиция PRD в первичный backlog — эпики, фичи и задачи с приоритетами, зависимостями и предложением итераций (MVP → v1)"
capabilities:
  - "pm"
  - "backlog"
tools: []
invocation:
  explicit: true
  implicit: true
localization:
  default_locale: "ru"
  available_locales:
    - "ru"
    - "en"
