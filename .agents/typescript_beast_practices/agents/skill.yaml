version: 1
name: "typescript_beast_practices"
display_name: "Практики TypeScript"
description: "TypeScript практики: строгая типизация, типобезопасные контракты, схемы валидации (zod/pydantic-analog по стеку), безопасные DTO и минимизация any."
default_prompt: "Используй $typescript_beast_practices, когда задача относится к навыку \"Практики TypeScript\"."
triggers:
  - "typescript_beast_practices"
  - "typescript beast practices"
  - "Практики TypeScript"
  - "TypeScript практики"
capabilities:
  - "typescript"
  - "beast"
  - "practices"
tools: []
invocation:
  explicit: true
  implicit: true
localization:
  default_locale: "ru"
  available_locales:
    - "ru"
    - "en"
