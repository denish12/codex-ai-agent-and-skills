version: 1
name: "node_express_beast_practices"
display_name: "Практики Node и Express"
description: "Node.js + Express: REST API, middleware, сервисный слой, репозитории, централизованная обработка ошибок, retries, rate limiting, фоновые задачи, структурированные логи."
default_prompt: "Используй $node_express_beast_practices, когда задача относится к навыку \"Практики Node и Express\"."
triggers:
  - "node_express_beast_practices"
  - "node express beast practices"
  - "Практики Node и Express"
  - "Node"
capabilities:
  - "node"
  - "express"
  - "beast"
  - "practices"
tools: []
invocation:
  explicit: true
  implicit: true
localization:
  default_locale: "ru"
  available_locales:
    - "ru"
    - "en"
