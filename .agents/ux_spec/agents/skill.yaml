version: 1
name: "ux_spec"
display_name: "UX-спецификация"
description: "Сформировать UX Spec — user flows, IA, список экранов, спецификация каждого экрана (действия/секции/валидации/состояния), критерии UX качества для разработки и тестирования."
default_prompt: "Используй $ux_spec, когда задача относится к навыку \"UX-спецификация\"."
triggers:
  - "ux_spec"
  - "ux spec"
  - "UX-спецификация"
  - "Сформировать UX Spec — user flows, IA, список экранов, спецификация каждого экрана (действия/секции/валидации/состояния), критерии UX качества для разработки и тестирования"
capabilities:
  - "ux"
  - "spec"
tools: []
invocation:
  explicit: true
  implicit: true
localization:
  default_locale: "ru"
  available_locales:
    - "ru"
    - "en"
