version: 1
name: "react_beast_practices"
display_name: "Практики React"
description: "React best practices: композиция, контейнер/презентер, хуки, контекст, производительность (memo/useMemo/useCallback), code splitting, error boundaries, a11y."
default_prompt: "Используй $react_beast_practices, когда задача относится к навыку \"Практики React\"."
triggers:
  - "react_beast_practices"
  - "react beast practices"
  - "Практики React"
  - "React best practices"
capabilities:
  - "react"
  - "beast"
  - "practices"
tools: []
invocation:
  explicit: true
  implicit: true
localization:
  default_locale: "ru"
  available_locales:
    - "ru"
    - "en"
