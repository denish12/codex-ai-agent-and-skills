version: 1
name: "observability-review"
display_name: "Проверка наблюдаемости"
description: "Ревью наблюдаемости — структурированные логи, request_id/trace_id, уровни логов, запрет утечек PII/секретов, соответствие Observability Plan."
default_prompt: "Используй $observability-review, когда задача относится к навыку \"Проверка наблюдаемости\"."
triggers:
  - "observability-review"
  - "observability review"
  - "Проверка наблюдаемости"
  - "Ревью наблюдаемости — структурированные логи, request_id/trace_id, уровни логов, запрет утечек PII/секретов, соответствие Observability Plan"
capabilities:
  - "observability"
  - "review"
tools: []
invocation:
  explicit: true
  implicit: true
localization:
  default_locale: "ru"
  available_locales:
    - "ru"
    - "en"
