version: 1
name: "wix-iframe-sdk"
display_name: "Wix iFrame SDK"
description: "Практический skill по legacy Wix iFrame SDK (deprecated) — поиск методов, событий, параметров, ограничений SDK/Editor и готовых Syntax/Example блоков из полной локальной базы. Использовать, когда нужно отвечать/разрабатывать/мигрировать код для Wix iFrame SDK, Wix Hive и deprecated HTTP API."
default_prompt: "Используй $wix-iframe-sdk, когда задача относится к навыку \"Wix iFrame SDK\"."
triggers:
  - "wix-iframe-sdk"
  - "wix iframe sdk"
  - "Практический skill по legacy Wix iFrame SDK (deprecated) — поиск методов, событий, параметров, ограничений SDK/Editor и готовых Syntax/Example блоков из полной локальной базы"
capabilities:
  - "wix"
  - "iframe"
  - "sdk"
tools: []
invocation:
  explicit: true
  implicit: true
localization:
  default_locale: "ru"
  available_locales:
    - "ru"
    - "en"
