version: 1
name: "release-gate-checklist-template"
display_name: "Шаблон чек-листа релизного гейта"
description: "Генерирует перед релизом видимый чек-лист RG-01…RG-xx (Evidence/DoD/Security/Ops/Post-deploy/Rollback) и правила статусов."
default_prompt: "Используй $release-gate-checklist-template, когда задача относится к навыку \"Шаблон чек-листа релизного гейта\"."
triggers:
  - "release-gate-checklist-template"
  - "release gate checklist template"
  - "Шаблон чек-листа релизного гейта"
  - "Генерирует перед релизом видимый чек-лист RG-01…RG-xx (Evidence/DoD/Security/Ops/Post-deploy/Rollback) и правила статусов"
capabilities:
  - "release"
  - "gate"
  - "checklist"
  - "template"
tools: []
invocation:
  explicit: true
  implicit: true
localization:
  default_locale: "ru"
  available_locales:
    - "ru"
    - "en"
