version: 1
name: "observability_logging"
display_name: "Логирование и наблюдаемость"
description: "Реализация наблюдаемости на уровне кода — структурированные логи (pino), request_id/trace_id корреляция, уровни логов, запрет утечки PII/секретов, базовые метрики, health checks. DO/DON'T примеры. Активируй при настройке логирования, добавлении метрик, или при вопросах «как правильно логировать»."
default_prompt: "Используй $observability_logging, когда задача относится к навыку \"Логирование и наблюдаемость\"."
triggers:
  - "observability_logging"
  - "observability logging"
  - "Логирование и наблюдаемость"
  - "Реализация наблюдаемости на уровне кода — структурированные логи (pino), request_id/trace_id корреляция, уровни логов, запрет утечки PII/секретов, базовые метрики, health checks"
capabilities:
  - "observability"
  - "logging"
tools: []
invocation:
  explicit: true
  implicit: true
localization:
  default_locale: "ru"
  available_locales:
    - "ru"
    - "en"
