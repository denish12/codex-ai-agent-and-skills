name: "tests-quality-review"
display_name: "Проверка качества тестов"
description: "Ревью качества unit/integration тестов — покрытие сценариев, границы, устойчивость, отсутствие флейков и тестовой \"магии\". Чеклист с приоритетами, примеры хорошего/плохого теста, шаблон выходного отчёта. Активируй при ревью существующих тестов, при стабилизации flaky тестов, или при аудите test suite quality."
default_prompt: "Используй $tests-quality-review, когда задача относится к навыку \"Проверка качества тестов\"."
triggers:
  - "tests-quality-review"
  - "tests quality review"
  - "Проверка качества тестов"
  - "Ревью качества unit/integration тестов — покрытие сценариев, границы, устойчивость, отсутствие флейков и тестовой \"магии\""
capabilities:
  - "tests"
  - "quality"
  - "review"
tools: []
implicit_invocation: true
