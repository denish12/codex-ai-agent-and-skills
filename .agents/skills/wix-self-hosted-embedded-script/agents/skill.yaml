version: 1
name: "wix-self-hosted-embedded-script"
display_name: "Самохостируемый встроенный скрипт для Wix"
description: "Практический runbook для Wix Self-Hosted Embedded Script — HTTPS локально, install webhook, embed script, resolve appInstanceId, DB-driven widget config, частые ошибки и проверка DEMO-ready."
default_prompt: "Используй $wix-self-hosted-embedded-script, когда задача относится к навыку \"Самохостируемый встроенный скрипт для Wix\"."
triggers:
  - "wix-self-hosted-embedded-script"
  - "wix self hosted embedded script"
  - "Самохостируемый встроенный скрипт для Wix"
  - "Практический runbook для Wix Self-Hosted Embedded Script — HTTPS локально, install webhook, embed script, resolve appInstanceId, DB-driven widget config, частые ошибки и проверка DEMO-ready"
capabilities:
  - "wix"
  - "self"
  - "hosted"
  - "embedded"
  - "script"
tools: []
invocation:
  explicit: true
  implicit: true
localization:
  default_locale: "ru"
  available_locales:
    - "ru"
    - "en"
