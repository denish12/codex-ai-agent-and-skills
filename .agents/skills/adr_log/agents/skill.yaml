version: 1
name: "adr_log"
display_name: "Журнал ADR"
description: "Зафиксировать ключевые архитектурные решения (ADR) с trade-offs — Pros/Cons/Alternatives/Decision, статусом и датой."
default_prompt: "Используй $adr_log, когда задача относится к навыку \"Журнал ADR\"."
triggers:
  - "adr_log"
  - "adr log"
  - "Журнал ADR"
  - "Зафиксировать ключевые архитектурные решения (ADR) с trade-offs — Pros/Cons/Alternatives/Decision, статусом и датой"
capabilities:
  - "adr"
  - "log"
tools: []
invocation:
  explicit: true
  implicit: true
localization:
  default_locale: "ru"
  available_locales:
    - "ru"
    - "en"
