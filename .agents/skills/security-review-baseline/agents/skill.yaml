version: 1
name: "security-review-baseline"
display_name: "Базовая security-проверка"
description: "Security ревью по baseline — OWASP-риски, authz, валидация, SSRF/XSS/CSRF, секреты, безопасные логи/ошибки, least privilege."
default_prompt: "Используй $security-review-baseline, когда задача относится к навыку \"Базовая security-проверка\"."
triggers:
  - "security-review-baseline"
  - "security review baseline"
  - "Базовая security-проверка"
  - "Security ревью по baseline — OWASP-риски, authz, валидация, SSRF/XSS/CSRF, секреты, безопасные логи/ошибки, least privilege"
capabilities:
  - "security"
  - "review"
  - "baseline"
tools: []
invocation:
  explicit: true
  implicit: true
localization:
  default_locale: "ru"
  available_locales:
    - "ru"
    - "en"
