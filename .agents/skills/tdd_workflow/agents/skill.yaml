version: 1
name: "tdd_workflow"
display_name: "TDD-锌褉芯褑械褋褋"
description: "袪邪蟹褉邪斜芯褌泻邪 褋褌褉芯谐芯 锌芯 TDD (RED鈫扜REEN鈫扲EFACTOR): 褎芯褉屑褍谢懈褉芯胁泻邪 褌械褋褌-泻械泄褋芯胁 褔械褉械蟹 user journey, unit + integration 褌械褋褌褘 褋 Vitest 懈 Testing Library, e2e 褋 Playwright 写谢褟 泻褉懈褌懈褔薪褘褏 锌芯褌芯泻芯胁. 袠褋锌芯谢褜蟹褍泄 褝褌芯褌 褋泻懈谢谢 袙小袝袚袛袗 泻芯谐写邪 薪褍卸薪芯 薪邪锌懈褋邪褌褜 褌械褋褌褘, 褉邪蟹褉邪斜芯褌邪褌褜 褎懈褔褍 褔械褉械蟹 TDD, 锌褉芯胁械褋褌懈 褉械胁褜褞 褌械褋褌芯胁 懈谢懈 芯斜褗褟褋薪懈褌褜 锌芯褔械屑褍 褌械褋褌 褏褉褍锌泻懈泄. 袗泻褌懈胁懈褉褍泄 锌褉懈 胁芯锌褉芯褋邪褏 芦泻邪泻 褌械褋褌懈褉芯胁邪褌褜 X禄, 芦锌芯褔械屑褍 褌械褋褌 谢芯屑邪械褌褋褟 锌褉懈 褉械褎邪泻褌芯褉懈薪谐械禄, 芦褔褌芯 褌邪泻芯械 褏芯褉芯褕懈泄 褌械褋褌禄."
default_prompt: "袠褋锌芯谢褜蟹褍泄 $tdd_workflow, 泻芯谐写邪 蟹邪写邪褔邪 芯褌薪芯褋懈褌褋褟 泻 薪邪胁褘泻褍 \"TDD-锌褉芯褑械褋褋\"."
triggers:
  - "tdd_workflow"
  - "tdd workflow"
  - "TDD-锌褉芯褑械褋褋"
  - "袪邪蟹褉邪斜芯褌泻邪 褋褌褉芯谐芯 锌芯 TDD (RED鈫扜REEN鈫扲EFACTOR)"
capabilities:
  - "tdd"
  - "workflow"
tools: []
invocation:
  explicit: true
  implicit: true
localization:
  default_locale: "ru"
  available_locales:
    - "ru"
    - "en"
