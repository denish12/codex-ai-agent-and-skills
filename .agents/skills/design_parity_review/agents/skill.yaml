version: 1
name: "design_parity_review"
display_name: "Проверка дизайн-паритета"
description: "Сравнить дизайн-артефакты с UX Spec или с реализованным UI. Выдать отчёт о расхождениях (Design Parity Report) с приоритетами P0/P1/P2 и конкретными рекомендациями."
default_prompt: "Используй $design_parity_review, когда задача относится к навыку \"Проверка дизайн-паритета\"."
triggers:
  - "design_parity_review"
  - "design parity review"
  - "Проверка дизайн-паритета"
  - "Сравнить дизайн-артефакты с UX Spec или с реализованным UI"
capabilities:
  - "design"
  - "parity"
  - "review"
tools: []
invocation:
  explicit: true
  implicit: true
localization:
  default_locale: "ru"
  available_locales:
    - "ru"
    - "en"
