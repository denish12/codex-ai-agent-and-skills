version: 1
name: "qa_test_plan"
display_name: "QA: тест-план"
description: "Составить тест-план и матрицу покрытия по PRD/UX: роли, критичные user flows, состояния UI, негативные кейсы, критерии приёмки."
default_prompt: "Используй $qa_test_plan, когда задача относится к навыку \"QA: тест-план\"."
triggers:
  - "qa_test_plan"
  - "qa test plan"
  - "QA: тест-план"
  - "Составить тест-план и матрицу покрытия по PRD/UX"
capabilities:
  - "qa"
  - "test"
  - "plan"
tools: []
invocation:
  explicit: true
  implicit: true
localization:
  default_locale: "ru"
  available_locales:
    - "ru"
    - "en"
