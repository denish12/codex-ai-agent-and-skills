version: 1
name: "design_intake"
display_name: "Сбор дизайн-источников"
description: "Найти и проанализировать предоставленные дизайн-материалы (файлы/ссылки), определить \"источник правды\" по UI и извлечь проверяемые правила (экраны, компоненты, токены, состояния)."
default_prompt: "Используй $design_intake, когда задача относится к навыку \"Сбор дизайн-источников\"."
triggers:
  - "design_intake"
  - "design intake"
  - "Сбор дизайн-источников"
  - "Найти и проанализировать предоставленные дизайн-материалы (файлы/ссылки), определить \"источник правды\" по UI и извлечь проверяемые правила (экраны, компоненты, токены, состояния)"
capabilities:
  - "design"
  - "intake"
tools: []
invocation:
  explicit: true
  implicit: true
localization:
  default_locale: "ru"
  available_locales:
    - "ru"
    - "en"
