version: 1
name: "cloud_infrastructure_security"
display_name: "Безопасность облака и инфраструктуры"
description: "Security ревью облака/инфры/CI/CD: IAM, secrets manager, сеть, логирование/мониторинг, supply chain, CDN/WAF, backup/DR."
default_prompt: "Используй $cloud_infrastructure_security, когда задача относится к навыку \"Безопасность облака и инфраструктуры\"."
triggers:
  - "cloud_infrastructure_security"
  - "cloud infrastructure security"
  - "Безопасность облака и инфраструктуры"
  - "Security ревью облака/инфры/CI/CD"
capabilities:
  - "cloud"
  - "infrastructure"
  - "security"
tools: []
invocation:
  explicit: true
  implicit: true
localization:
  default_locale: "ru"
  available_locales:
    - "ru"
    - "en"
