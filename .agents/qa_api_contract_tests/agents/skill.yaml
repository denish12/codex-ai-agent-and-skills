version: 1
name: "qa_api_contract_tests"
display_name: "QA: API-контрактные тесты"
description: "Проверить API на соответствие контрактам — схемы, коды, ошибки, валидация, пагинация; smoke через curl/скрипты."
default_prompt: "Используй $qa_api_contract_tests, когда задача относится к навыку \"QA: API-контрактные тесты\"."
triggers:
  - "qa_api_contract_tests"
  - "qa api contract tests"
  - "QA: API-контрактные тесты"
  - "Проверить API на соответствие контрактам — схемы, коды, ошибки, валидация, пагинация"
capabilities:
  - "qa"
  - "api"
  - "contract"
  - "tests"
tools: []
invocation:
  explicit: true
  implicit: true
localization:
  default_locale: "ru"
  available_locales:
    - "ru"
    - "en"
