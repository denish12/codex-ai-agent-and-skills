version: 1
name: "release_gate"
display_name: "Релизный гейт"
description: "Финальный релиз-гейт: собрать отчёты Reviewer+Tester+CI, проверить DoD, классифицировать риски, принять решение GO/NO-GO и сформировать план закрытия."
default_prompt: "Используй $release_gate, когда задача относится к навыку \"Релизный гейт\"."
triggers:
  - "release_gate"
  - "release gate"
  - "Релизный гейт"
  - "Финальный релиз-гейт"
capabilities:
  - "release"
  - "gate"
tools: []
invocation:
  explicit: true
  implicit: true
localization:
  default_locale: "ru"
  available_locales:
    - "ru"
    - "en"
