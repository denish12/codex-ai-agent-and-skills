version: 1
name: "ux_discovery"
display_name: "UX discovery"
description: "Уточнить UX вводные по PRD: роли, основные потоки, навигация, платформы (responsive), бренд/референсы, локализация, edge cases."
default_prompt: "Используй $ux_discovery, когда задача относится к навыку \"UX discovery\"."
triggers:
  - "ux_discovery"
  - "ux discovery"
  - "Уточнить UX вводные по PRD"
capabilities:
  - "ux"
  - "discovery"
tools: []
invocation:
  explicit: true
  implicit: true
localization:
  default_locale: "ru"
  available_locales:
    - "ru"
    - "en"
