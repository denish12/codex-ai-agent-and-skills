version: 1
name: "qa_manual_run"
display_name: "QA: ручной прогон"
description: "Ручной прогон критичных сценариев и регресса: happy/edge/error paths по UX Spec; фиксация багов с шагами и доказательствами."
default_prompt: "Используй $qa_manual_run, когда задача относится к навыку \"QA: ручной прогон\"."
triggers:
  - "qa_manual_run"
  - "qa manual run"
  - "QA: ручной прогон"
  - "Ручной прогон критичных сценариев и регресса"
capabilities:
  - "qa"
  - "manual"
  - "run"
tools: []
invocation:
  explicit: true
  implicit: true
localization:
  default_locale: "ru"
  available_locales:
    - "ru"
    - "en"
