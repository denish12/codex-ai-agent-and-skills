version: 1
name: "seo-copywriting"
display_name: "SEO-копирайтинг"
description: "SEO-оптимизация текста: ключевые слова, структура, мета-теги"
default_prompt: "Используй $seo-copywriting, когда задача относится к навыку \"SEO-копирайтинг\"."
triggers:
  - "seo-copywriting"
  - "SEO-копирайтинг"
  - "SEO-оптимизация текста: ключевые слова, структура, мета-теги"
capabilities:
  - "seo-copywriting"
tools: []
invocation:
  explicit: true
  implicit: true
localization:
  default_locale: "ru"
  available_locales:
    - "ru"
    - "en"
