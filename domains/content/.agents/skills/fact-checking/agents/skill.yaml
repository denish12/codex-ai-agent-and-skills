version: 1
name: "fact-checking"
display_name: "Факт-чекинг"
description: "Верификация фактов — типология, иерархия источников, severity, методы проверки, порог PASS/FAIL"
default_prompt: "Используй $fact-checking, когда задача относится к навыку \"Факт-чекинг\"."
triggers:
  - "fact-checking"
  - "Факт-чекинг"
  - "Верификация фактов — типология, иерархия источников, severity, методы проверки, порог PASS/FAIL"
capabilities:
  - "fact-checking"
tools: []
invocation:
  explicit: true
  implicit: true
localization:
  default_locale: "ru"
  available_locales:
    - "ru"
    - "en"
