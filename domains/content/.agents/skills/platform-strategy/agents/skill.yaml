version: 1
name: "platform-strategy"
display_name: "Стратегия платформ"
description: "Стратегия по платформам: выбор каналов и форматов под аудиторию"
default_prompt: "Используй $platform-strategy, когда задача относится к навыку \"Стратегия платформ\"."
triggers:
  - "platform-strategy"
  - "Стратегия платформ"
  - "Стратегия по платформам: выбор каналов и форматов под аудиторию"
capabilities:
  - "platform-strategy"
tools: []
invocation:
  explicit: true
  implicit: true
localization:
  default_locale: "ru"
  available_locales:
    - "ru"
    - "en"
