version: 1
name: "styling-css-stack"
display_name: "Styling & CSS Stack"
description: "CSS practices — custom properties (design tokens), naming (BEM / CSS Modules), responsive, transitions, z-index scale, dark mode, a11y (focus-visible, prefers-reduced-motion, forced-colors). DO/DON'T examples. Activate when writing or reviewing CSS/Less/Sass, when refactoring styles, or for questions \"how to properly style X\"."
default_prompt: "Use $styling-css-stack when the task matches the \"Styling & CSS Stack\" skill."
triggers:
  - "styling-css-stack"
  - "styling css stack"
  - "Styling & CSS Stack"
  - "CSS practices — custom properties (design tokens), naming (BEM / CSS Modules), responsive, transitions, z-index scale, dark mode, a11y (focus-visible, prefers-reduced-motion, forced-colors)"
capabilities:
  - "styling"
  - "css"
  - "stack"
tools: []
invocation:
  explicit: true
  implicit: true
localization:
  default_locale: "en"
  available_locales:
    - "ru"
    - "en"
