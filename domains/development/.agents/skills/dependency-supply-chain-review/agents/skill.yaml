version: 1
name: "dependency-supply-chain-review"
display_name: "Проверка зависимостей и цепочки поставок"
description: "Ревью зависимостей с обязательной проверкой через socket.dev MCP (depscore) — supply chain, vulnerability, лицензии. P0 алерты блокируют установку."
default_prompt: "Используй $dependency-supply-chain-review, когда задача относится к навыку \"Проверка зависимостей и цепочки поставок\"."
triggers:
  - "dependency-supply-chain-review"
  - "dependency supply chain review"
  - "Проверка зависимостей и цепочки поставок"
  - "Ревью зависимостей с обязательной проверкой через socket.dev MCP (depscore) — supply chain, vulnerability, лицензии. P0 алерты блокируют установку"
capabilities:
  - "dependency"
  - "supply"
  - "chain"
  - "review"
tools: []
invocation:
  explicit: true
  implicit: true
localization:
  default_locale: "ru"
  available_locales:
    - "ru"
    - "en"
