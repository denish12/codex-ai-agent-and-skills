version: 1
name: "ui-inventory"
display_name: "Инвентаризация UI-компонентов"
description: "Составить инвентарь UI компонентов и правила переиспользования — базовые компоненты, композиционные компоненты, паттерны (forms, tables, dialogs), дизайн-токены (минимум)."
default_prompt: "Используй $ui-inventory, когда задача относится к навыку \"Инвентаризация UI-компонентов\"."
triggers:
  - "ui-inventory"
  - "ui inventory"
  - "Инвентаризация UI-компонентов"
  - "Составить инвентарь UI компонентов и правила переиспользования — базовые компоненты, композиционные компоненты, паттерны (forms, tables, dialogs), дизайн-токены (минимум)"
capabilities:
  - "ui"
  - "inventory"
tools: []
invocation:
  explicit: true
  implicit: true
localization:
  default_locale: "ru"
  available_locales:
    - "ru"
    - "en"
