version: 1
name: "current-state-analysis"
display_name: "Анализ текущего состояния"
description: "Анализ текущей архитектуры репозитория — конвенции, паттерны, техдолг, узкие места масштабирования, риски безопасности и консистентность."
default_prompt: "Используй $current-state-analysis, когда задача относится к навыку \"Анализ текущего состояния\"."
triggers:
  - "current-state-analysis"
  - "current state analysis"
  - "Анализ текущего состояния"
  - "Анализ текущей архитектуры репозитория — конвенции, паттерны, техдолг, узкие места масштабирования, риски безопасности и консистентность"
capabilities:
  - "current"
  - "state"
  - "analysis"
tools: []
invocation:
  explicit: true
  implicit: true
localization:
  default_locale: "ru"
  available_locales:
    - "ru"
    - "en"
