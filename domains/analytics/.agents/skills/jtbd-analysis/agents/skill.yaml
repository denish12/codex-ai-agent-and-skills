version: 1
name: "jtbd-analysis"
display_name: "Jobs To Be Done"
description: "Анализ задач клиента — функциональные, эмоциональные, социальные задачи и opportunity score"
default_prompt: "Используй $jtbd-analysis, когда задача относится к навыку \"Jobs To Be Done\"."
triggers:
  - "jtbd-analysis"
  - "JTBD"
  - "Jobs To Be Done"
  - "задачи клиента"
capabilities:
  - "jtbd-analysis"
tools: []
invocation:
  explicit: true
  implicit: true
localization:
  default_locale: "ru"
  available_locales:
    - "ru"
    - "en"
