version: 1
name: "rfm-analysis"
display_name: "RFM-анализ"
description: "Сегментация клиентов по давности, частоте и сумме покупок"
default_prompt: "Используй $rfm-analysis, когда задача относится к навыку \"RFM-анализ\"."
triggers:
  - "rfm-analysis"
  - "RFM"
  - "RFM-анализ"
  - "сегментация клиентов"
capabilities:
  - "rfm-analysis"
tools: []
invocation:
  explicit: true
  implicit: true
localization:
  default_locale: "ru"
  available_locales:
    - "ru"
    - "en"
