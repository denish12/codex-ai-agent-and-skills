version: 1
name: "trend-analysis"
display_name: "Анализ трендов"
description: "Идентификация и оценка рыночных трендов — сила, влияние, таймлайн, рекомендации"
default_prompt: "Используй $trend-analysis, когда задача относится к навыку \"Анализ трендов\"."
triggers:
  - "trend-analysis"
  - "анализ трендов"
  - "тренды"
  - "trend identification"
capabilities:
  - "trend-analysis"
tools: []
invocation:
  explicit: true
  implicit: true
localization:
  default_locale: "ru"
  available_locales:
    - "ru"
    - "en"
