version: 1
name: "ansoff-matrix"
display_name: "Матрица Ансоффа"
description: "Стратегия роста — проникновение на рынок, развитие рынка, развитие продукта, диверсификация"
default_prompt: "Используй $ansoff-matrix, когда задача относится к навыку \"Матрица Ансоффа\"."
triggers:
  - "ansoff-matrix"
  - "матрица Ансоффа"
  - "ansoff"
  - "матрица роста"
capabilities:
  - "ansoff-matrix"
tools: []
invocation:
  explicit: true
  implicit: true
localization:
  default_locale: "ru"
  available_locales:
    - "ru"
    - "en"
