version: 1
name: "epic-breakdown"
display_name: "Epic Breakdown"
description: "Декомпозиция эпика на stories с зависимостями, size estimates (S/M/L/XL), critical path"
default_prompt: "Используй $epic-breakdown, когда задача относится к навыку \"Epic Breakdown\"."
triggers:
  - "epic-breakdown"
  - "epic breakdown"
  - "декомпозиция эпика"
capabilities:
  - "epic-breakdown"
tools: []
invocation:
  explicit: true
  implicit: true
localization:
  default_locale: "ru"
  available_locales:
    - "ru"
